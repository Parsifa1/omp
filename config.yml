lastChangelogVersion: 14.0.2
startup: 
  checkUpdate: false
theme: 
  dark: everforest
symbolPreset: nerd
statusLine: 
  preset: custom
  separator: none
  leftSegments: 
    - path
    - git
  rightSegments: 
    - model
    - context_pct
    - token_total
    - subagents
  segmentOptions: 
    model: null
    path: 
      abbreviate: true
      maxLength: 48
      stripWorkPrefix: true
    git: 
      showBranch: true
      showStaged: false
      showUnstaged: false
      showUntracked: false
  showHookStatus: false
showHardwareCursor: true
modelRoles: 
  default: axonhub/claude-sonnet-4-6
  designer: axonhub/gemini-3.1-pro-preview
  vision: axonhub/gemini-3.1-pro-preview
  smol: axonhub/gpt-5-mini:low
  plan: axonhub/gpt-5.4
  slow: axonhub/gpt-5.4
browser: 
  headless: true
secrets: 
  enabled: true
edit: 
  mode: hashline
lsp: 
  diagnosticsOnEdit: true
hideThinkingBlock: false
contextPromotion: 
  enabled: false
compaction: 
  enabled: true
  thresholdPercent: 70
  strategy: context-full
  remoteEnabled: true
retry: 
  maxRetries: 5
memories: 
  enabled: true
branchSummary: 
  enabled: true
collapseChangelog: true
renderMermaid: 
  enabled: true
inspect_image: 
  enabled: true
calc: 
  enabled: true
async: 
  enabled: true
task: 
  isolation: 
    mode: worktree
  eager: true
commands: 
  enableClaudeUser: false
  enableClaudeProject: false
bashInterceptor: 
  enabled: true
read: 
  defaultLimit: 300
disabledExtensions: 
  - skill:opencode-skill-install-flow
  - slash-command:copilot-stats
readHashLines: true
checkpoint: 
  enabled: true
tools: 
  intentTracing: true
skills: 
  customDirectories: 
    - ~/.local/share/.agents/skills/superpowers/skills/
    - ~/.local/share/.agents/skills/impeccable/source/skills/
repeatToolDescriptions: false
ttsr: 
  contextMode: discard
  repeatMode: after-gap
todo: 
  reminders: 
    max: 5
  eager: false
mcp: 
  discoveryMode: true
  notifications: true
providers: 
  webSearch: exa
